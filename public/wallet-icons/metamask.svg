<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="42" fill="white"/>
  <!-- Left ear outer -->
  <path d="M55 90 L46 18 L88 70 Z" fill="#CD6116"/>
  <!-- Right ear outer -->
  <path d="M145 90 L154 18 L112 70 Z" fill="#CD6116"/>
