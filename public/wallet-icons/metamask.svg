  <ellipse cx="100" cy="130" rx="11" ry="7" fill="#C45A0B"/>
  <!-- Nose -->
  <path d="M91 130 Q100 124 109 130 Q109 140 100 144 Q91 140 91 130 Z" fill="#1A1A1A"/>
  <!-- Mouth -->
