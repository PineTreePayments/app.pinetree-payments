  <circle cx="85" cy="108" r="3" fill="white" opacity="0.55"/>
  <!-- Right eye white -->
  <ellipse cx="121" cy="110" rx="14" ry="16" fill="white"/>
  <!-- Right pupil -->
  <ellipse cx="123" cy="113" rx="8" ry="10" fill="#1C1C1C"/>
  <!-- Right eye highlight -->
  <circle cx="127" cy="108" r="3" fill="white" opacity="0.55"/>
  <!-- Snout muzzle -->
  <ellipse cx="100" cy="144" rx="22" ry="16" fill="#CD6116"/>
