# PineTree Node SDK CI.
# Normal CI never requires secrets or live integration services.

name: SDK CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/pinetree-node/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/sdk-ci.yml"
  pull_request:
    paths:
      - "packages/pinetree-node/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - ".github/workflows/sdk-ci.yml"

jobs:
  # ── Standard CI (no secrets required) ──────────────────────────────────────
  sdk:
    name: SDK — Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: "package-lock.json"

      # Keep the install deterministic while skipping dependency-owned lifecycle
      # scripts from unrelated app packages. SDK build/test scripts run below.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # SDK typecheck
      - name: SDK typecheck
        run: npm run typecheck --workspace packages/pinetree-node

      # SDK build (ESM + CJS + declarations)
      - name: SDK build
        run: npm run build --workspace packages/pinetree-node

      # SDK offline unit tests
      - name: SDK unit tests
        run: npm test --workspace packages/pinetree-node

      # Next.js 16 and 256 transitive packages require Node >=20.9.0.
      # Run root app validation only on the LTS node (20) to keep CI fast.
      - name: Root typecheck
        if: matrix.node == '20'
        run: npm run typecheck

      - name: Root tests
        if: matrix.node == '20'
        run: npm test

      - name: Root production build
        if: matrix.node == '20'
        run: npm run build

      - name: SDK release-candidate validation
        if: matrix.node == '20'
        run: npm run release-candidate --workspace packages/pinetree-node

  # ── Integration tests (opt-in, requires secrets) ────────────────────────────
  #
  # Triggered manually via workflow_dispatch only.
  # Requires the following repository/environment secrets:
  #   PINETREE_INTEGRATION_API_KEY         — test-mode API key (pt_test_*)
  #   PINETREE_INTEGRATION_WEBHOOK_SECRET  — matching webhook signing secret
  # And the following variable:
  #   PINETREE_INTEGRATION_BASE_URL        — e.g. https://staging.pinetree-payments.com
  #
  # Production integration tests are never enabled by default.
  # Set PINETREE_ALLOW_PRODUCTION_INTEGRATION=true only after explicit approval.
  sdk-integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: sdk-integration  # gate on a protected environment for secret access

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "package-lock.json"

      # Keep the install deterministic while skipping dependency-owned lifecycle
      # scripts from unrelated app packages. SDK build/test scripts run below.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: SDK build
        run: npm run build --workspace packages/pinetree-node

      - name: SDK integration tests
        run: npm run test:integration --workspace packages/pinetree-node
        env:
          PINETREE_RUN_INTEGRATION: "true"
          PINETREE_INTEGRATION_BASE_URL: ${{ vars.PINETREE_INTEGRATION_BASE_URL }}
          PINETREE_INTEGRATION_API_KEY: ${{ secrets.PINETREE_INTEGRATION_API_KEY }}
          PINETREE_INTEGRATION_WEBHOOK_SECRET: ${{ secrets.PINETREE_INTEGRATION_WEBHOOK_SECRET }}
          # Do NOT set PINETREE_ALLOW_PRODUCTION_INTEGRATION here.
          # Production integration tests require separate manual approval.
